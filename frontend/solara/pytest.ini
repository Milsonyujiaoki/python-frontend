# pytest configuration for end-to-end tests
testpaths = tests/e2e
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --strict-markers
    --tb=short
markers =
    e2e: marks tests as end-to-end tests
    smoke: marks tests as smoke tests
    regression: marks tests as regression tests
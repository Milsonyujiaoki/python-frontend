[tool.black]
line-length = 88
target-version = ['py313']
include = '\.pyi?$'
extend-exclude = '''
/(
    .git
  | .hg
  | .mypy_cache
  | .tox
  | .venv
  | _build
  | buck-out
  | build
  | dist
)/
'''

[tool.ruff]
select = ["E", "F", "W", "C90"]
ignore = []
line-length = 88
target-version = "py313"

[tool.ruff.per-file-ignores]
# For example, we can ignore certain rules in specific files if needed.
# "__init__.py" = ["F401"]